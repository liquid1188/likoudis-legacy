name: Warm CDN cache after deploy

on:
  deployment_status:

jobs:
  warm:
    if: ${{ github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Warm every deployed asset
        run: |
          sleep 20  # let the CDN edge settle
          DOMAIN="$(cat CNAME)"
          git ls-files | grep -Ei '\.(html|css|js|jpe?g|png|svg|webp|ico)$' > /tmp/files
          echo "" >> /tmp/files
          total=0; warmed=0
          while read -r f; do
            total=$((total+1))
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0 (cache-warmer)" "https://$DOMAIN/$f") || code=000
              if [ "$code" = "200" ]; then warmed=$((warmed+1)); break; fi
              sleep 2
            done
          done < /tmp/files
          echo "Warmed $warmed/$total assets on $DOMAIN"
